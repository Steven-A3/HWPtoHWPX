name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q
      # The private corpus is absent here, so most tests skip. Assert the
      # public-fixture tests actually ran: a mistake in the skip logic would
      # otherwise hollow CI out into a green no-op. pytest exits 0 when every
      # test skips, so the exit code alone proves nothing -- inspect the
      # summary line and fail on any skip or on the absence of passes.
      - name: Verify the public-fixture gate ran
        run: |
          set -o pipefail
          summary=$(python -m pytest tests/test_public_fixture.py -q --no-header | tail -1)
          echo "$summary"
          case "$summary" in
            *skipped*) echo "::error::public-fixture gate skipped; the skip logic is wrong"; exit 1 ;;
          esac
          case "$summary" in
            *passed*) ;;
            *) echo "::error::public-fixture gate reported no passing tests"; exit 1 ;;
          esac

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      # Install the built wheel into a clean environment and drive the real
      # console script. This is what catches packaging faults a source-tree
      # test run cannot see: a module missing from the wheel, a broken entry
      # point, an undeclared runtime dependency.
      - name: Install the wheel and convert
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install --quiet dist/*.whl
          /tmp/venv/bin/hwp2hwpx --version
          /tmp/venv/bin/hwp2hwpx samples/test_document.hwp -o /tmp/out.hwpx
          test -s /tmp/out.hwpx
